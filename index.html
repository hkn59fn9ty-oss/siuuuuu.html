<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Đánh giá Phát âm Tiếng Trung</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            background-color: #fff;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .btn-record {
            background-color: #ef4444;
        }
        .btn-record:hover {
            background-color: #dc2626;
        }
        .btn-record.recording {
            animation: pulse 1.5s infinite;
            background-color: #b91c1c;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .question-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 5px solid var(--primary);
            display: none;
        }
        .chinese-text {
            font-size: 24px;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 5px;
        }
        .pinyin-text {
            font-size: 16px;
            color: #64748b;
            font-style: italic;
            margin-bottom: 5px;
        }
        .vietnamese-text {
            font-size: 16px;
            color: #334155;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #fafafa;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .score {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .audio-practice {
            display: inline-flex;
            align-items: center;
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        .audio-practice:hover {
            background: #fca5a5;
        }
        .audio-icon {
            margin-right: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>
<H1>Đinh Nguyễn Khôi Nguyên</H1>
<div class="container">
    <h1>AI Luyện Phát Âm Tiếng Trung Bản Xứ</h1>
    
    <div class="section">
        <label for="topicSelect">Chọn chủ đề học tập:</label>
        <select id="topicSelect">
            <option value="1">1. Chào hỏi & Thông tin cá nhân</option>
            <option value="2">2. Gia đình & Bạn bè</option>
            <option value="3">3. Thói quen hàng ngày</option>
            <option value="4">4. Sở thích & Thời gian rảnh</option>
            <option value="5">5. Đồ ăn & Thức uống</option>
            <option value="6">6. Công việc & Học tập</option>
            <option value="7">7. Du lịch & Di chuyển</option>
            <option value="8">8. Thời tiết & Thiên nhiên</option>
            <option value="9">9. Mua sắm & Quần áo</option>
            <option value="10">10. Sức khỏe & Cảm xúc</option>
        </select>
        <button class="btn" onclick="startNewQuestion()">Bắt đầu hỏi / Câu tiếp theo</button>
    </div>

    <div id="questionBox" class="question-box">
        <div style="font-size: 14px; color: #64748b; margin-bottom: 5px; font-weight: bold;">HỆ THỐNG HỎI:</div>
        <div class="chinese-text" id="qChinese"></div>
        <div class="pinyin-text" id="qPinyin"></div>
        <div class="vietnamese-text" id="qVietnamese"></div>
        
        <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 15px 0;">
        <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()">Bấm vào đây để Trả lời (Phát âm)</button>
    </div>

    <div id="resultBox" class="result-box">
        <h3>Kết quả phân tích:</h3>
        <p><strong>Nội dung bạn vừa nói:</strong> <span id="spokenText" style="color: #4f46e5; font-size: 18px; font-weight: bold;"></span></p>
        <div class="score" id="scoreValue"></div>
        <div id="practiceContainer"></div>
    </div>
</div>

    let currentQuestion = null;
    let recognition = null;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = function() {
            isRecording = true;
            const btn = document.getElementById('recordBtn');
            btn.innerText = "Đang lắng nghe... Hãy nói ngay...";
            btn.classList.add('recording');
        };

        recognition.onerror = function(event) {
            console.error(event.error);
            alert("Lỗi micro: " + event.error);
            stopRecordingState();
        };

        recognition.onend = function() {
            stopRecordingState();
        };

        recognition.onresult = function(event) {
            const resultText = event.results[0][0].transcript;
            evaluatePronunciation(resultText);
        };
    } else {
        alert("Trình duyệt không hỗ trợ nhận giọng nói. Khuyên dùng Google Chrome!");
    }

    function stopRecordingState() {
        isRecording = false;
        const btn = document.getElementById('recordBtn');
        btn.innerText = "Bấm vào đây để Trả lời (Phát âm)";
        btn.classList.remove('recording');
    }

    function startNewQuestion() {
        const topicId = document.getElementById('topicSelect').value;
        const questions = qaData[topicId];
        const randomIndex = Math.floor(Math.random() * questions.length);
        currentQuestion = questions[randomIndex];

        document.getElementById('qChinese').innerText = currentQuestion.cn;
        document.getElementById('qPinyin').innerText = currentQuestion.py;
        document.getElementById('qVietnamese').innerText = currentQuestion.vi;

        document.getElementById('questionBox').style.display = 'block';
        document.getElementById('resultBox').style.display = 'none';
    }

    function toggleRecording() {
        if (!recognition) return;
        if (isRecording) {
            recognition.stop();
        } else {
            recognition.start();
        }
    }

    function evaluatePronunciation(spokenText) {
        document.getElementById('resultBox').style.display = 'block';
        
        // Làm sạch văn bản để so sánh chính xác tuyệt đối
        const cleanSpoken = spokenText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()？。，！\s]/g,"").trim();
        const cleanTarget = currentQuestion.cn.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()？。，！\s]/g,"").trim();

        document.getElementById('spokenText').innerText = spokenText;

        const distance = levenshteinDistance(cleanSpoken, cleanTarget);
        const maxLength = Math.max(cleanSpoken.length, cleanTarget.length);
        
        let scorePercent = 0;
        if (maxLength > 0) {
            scorePercent = Math.round(((maxLength - distance) / maxLength) * 100);
        }

        const scoreDiv = document.getElementById('scoreValue');
        const practiceContainer = document.getElementById('practiceContainer');
        practiceContainer.innerHTML = "";

        if (scorePercent >= 90) {
            scoreDiv.innerHTML = `<span style="color: #16a34a;">Đạt điểm tối đa: ${scorePercent}% (Phát âm chuẩn người bản xứ!)</span>`;
        } else {
            scoreDiv.innerHTML = `<span style="color: #d97706;">Chưa đạt tối đa: ${scorePercent}% (Hãy thử nghe lại bản mẫu bên dưới)</span>`;
            practiceContainer.innerHTML = `
                <div class="audio-practice" onclick="speakNative('${currentQuestion.cn}')">
                    <span class="audio-icon">🔊</span> Bấm để nghe phát âm câu mẫu chuẩn
                </div>
            `;
        }
    }

    function speakNative(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Thiết bị không hỗ trợ Text-to-Speech.");
        }
    }

    // ĐÃ FIX LỖI CHỈ MỤC THUẬT TOÁN ĐO KHOẢNG CÁCH CHUỖI LEVENSHTEIN
    function levenshteinDistance(str1, str2) {
        const track = Array(str2.length + 1).fill(null).map(() => Array(str1.length + 1).fill(null));
        for (let i = 0; i <= str1.length; i += 1) track[0][i] = i;
        for (let j = 0; j <= str2.length; j += 1) track[j][0] = j;
        for (let j = 1; j <= str2.length; j += 1) {
            for (let i = 1; i <= str1.length; i += 1) {
                const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
                track[j][i] = Math.min(
                    track[j][i - 1] + 1, // SỬA TẠI ĐÂY: Sửa "1 - 1" thành "i - 1"
                    track[j - 1][i] + 1, 
                    track[j - 1][i - 1] + indicator // SỬA TẠI ĐÂY: Sửa "1 - 1" thành "i - 1"
                );
            }
        }
        return track[str2.length][str1.length];
    }
